[workspace]
name = "particleflow"
version = "2.5.0"
description = "Machine Learning for Particle Flow Reconstruction"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.10"
snakemake = ">=8.0"
snakemake-executor-plugin-cluster-generic = "*"
snakemake-executor-plugin-slurm = "*"
pyyaml = "*"

[pypi-dependencies]
comet-ml = "*"

[activation]
env = { SITE = "tallinn", PROFILE = ".profiles/tallinn", APPTAINER_ARGS = "-B /local -B /cvmfs -B /scratch/local -B /scratch/persistent --nv" }

[tasks]
setup = "sed -i '0,/^  <<: \\*.*$/s//  <<: \\*tallinn/' particleflow_spec.yaml"
init = """
mkdir -p .profiles/tallinn \
&& echo '#!/bin/bash
# properties = {properties}
export PYTHONUNBUFFERED=1
export GOTO_NUM_THREADS=1
export MKL_NUM_THREADS=1
export NUMEXPR_NUM_THREADS=1
export OMP_NUM_THREADS=1
export OPENBLAS_NUM_THREADS=1
export VECLIB_MAXIMUM_THREADS=1
env
sleep $((RANDOM % 10))
stdbuf -oL -eL {exec_job}' > .profiles/tallinn/jobscript.sh \
&& echo 'executor: "slurm"
jobscript: "jobscript.sh"
jobs: unlimited
restart-times: 0
max-jobs-per-second: 2
max-status-checks-per-second: 2
verbose: true
use-conda: false
default-resources:
  - slurm_account="hepusers"' > .profiles/tallinn/config.v8+.yaml
"""

snakefile = { cmd = "bash -c 'PYTHONPATH=. python3 mlpf/produce_snakemake.py --production ${PROD:-cms_run3} --model \"${MODEL:-}\" --steps ${STEPS:-gen,post,tfds,train} --split'", depends-on = ["setup"] }
gen = { cmd = "bash -c 'snakemake --workflow-profile $PROFILE --snakefile snakemake_jobs/${PROD:-cms_run3}/Snakefile.gen --use-apptainer --apptainer-args \"$APPTAINER_ARGS\" --cores ${CORES:-1} ${BATCH:+--batch all=$BATCH}'", depends-on = ["setup"] }
post = { cmd = "bash -c 'snakemake --workflow-profile $PROFILE --snakefile snakemake_jobs/${PROD:-cms_run3}/Snakefile.post --use-apptainer --apptainer-args \"$APPTAINER_ARGS\" --cores ${CORES:-1} ${BATCH:+--batch all=$BATCH}'", depends-on = ["setup"] }
tfds = { cmd = "bash -c 'snakemake --workflow-profile $PROFILE --snakefile snakemake_jobs/${PROD:-cms_run3}/Snakefile.tfds --use-apptainer --apptainer-args \"$APPTAINER_ARGS\" --cores ${CORES:-1}'", depends-on = ["setup"] }
train = { cmd = "bash -c 'snakemake --workflow-profile $PROFILE --snakefile snakemake_jobs/${PROD:-cms_run3}/Snakefile.train --use-apptainer --apptainer-args \"$APPTAINER_ARGS\" --cores ${CORES:-1}'", depends-on = ["setup"] }
validation = { cmd = "bash -c 'PYTHONPATH=. python3 mlpf/produce_validation_snakemake.py --config ${VAL_CONFIG:-validation_cms.yaml} && snakemake --workflow-profile $PROFILE --snakefile snakemake_jobs/validation_${PROD:-cms_run3}/Snakefile --use-apptainer --apptainer-args \"$APPTAINER_ARGS\" --cores 1'", depends-on = ["setup"] }
dry-run = "bash -c 'snakemake --snakefile snakemake_jobs/${PROD:-cms_run3}/Snakefile --dry-run'"
