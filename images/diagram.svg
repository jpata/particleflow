<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
    <defs>
        <!-- Arrowheads -->
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 1 L 10 5 L 0 9 z" fill="#475569" />
        </marker>
        <marker id="arrow-reverse" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 10 1 L 0 5 L 10 9 z" fill="#475569" />
        </marker>
        
        <!-- Box Shadow -->
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.1"/>
        </filter>
    </defs>

    <!-- ========================================== -->
    <!-- TOP ROW: DATA FLOW                         -->
    <!-- ========================================== -->

    <!-- 1. Input Set -->
    <g transform="translate(100, 180)">
        <!-- Header Text -->
        <text x="0" y="-100" font-size="20" font-weight="500" fill="#0F172A" text-anchor="middle">Event as input set</text>

        <!-- Nodes -->
        <polygon points="-40,-19 -48,-4 -32,-4" fill="#0EA5E9"/> <!-- Track 1 -->
        <circle cx="-20" cy="-35" r="8" fill="#F59E0B"/> <!-- Calo 1 -->
        <polygon points="0,-24 -8,-9 8,-9" fill="#0EA5E9"/> <!-- Track 2 -->
        <circle cx="30" cy="-30" r="8" fill="#F59E0B"/> <!-- Calo 2 -->
        <polygon points="40,-9 32,6 48,6" fill="#0EA5E9"/> <!-- Track 3 -->
        <circle cx="15" cy="20" r="8" fill="#F59E0B"/> <!-- Calo 3 -->
        <polygon points="-10,21 -18,36 -2,36" fill="#0EA5E9"/> <!-- Track 4 -->
        <circle cx="-30" cy="25" r="8" fill="#F59E0B"/> <!-- Calo 4 -->
        <polygon points="-50,21 -58,36 -42,36" fill="#0EA5E9"/> <!-- Track 5 -->
        <circle cx="50" cy="35" r="8" fill="#F59E0B"/> <!-- Calo 5 -->
        <polygon points="25,41 17,56 33,56" fill="#0EA5E9"/> <!-- Track 6 -->
        <circle cx="-15" cy="60" r="8" fill="#F59E0B"/> <!-- Calo 6 -->
    </g>

    <!-- Arrow: Input -> Encoding -->
    <line x1="160" y1="180" x2="190" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Box 0: Elementwise Encoding -->
    <g transform="translate(260, 180)">
        <rect x="-65" y="-35" width="130" height="70" rx="6" fill="#0EA5E9" filter="url(#shadow)"/>
        <text x="0" y="-5" fill="#FFFFFF" font-size="18" font-weight="600" text-anchor="middle">Elementwise</text>
        <text x="0" y="18" fill="#FFFFFF" font-size="18" font-weight="600" text-anchor="middle">encoding</text>
    </g>

    <!-- Arrow: Encoding -> Embedded State -->
    <line x1="330" y1="180" x2="360" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />

    <!-- 1.5. Embedded State -->
    <g transform="translate(420, 180)">
        <!-- Header Text -->
        <text x="0" y="-100" font-size="20" font-weight="500" fill="#0F172A" text-anchor="middle">Embedded state</text>

        <!-- Embedded Nodes (Uniform gradient, NO edges, ALL squares) -->
        <rect x="-48" y="-18" width="16" height="16" fill="#D946EF"/>
        <rect x="-28" y="-43" width="16" height="16" fill="#A855F7"/>
        <rect x="-8" y="-23" width="16" height="16" fill="#8B5CF6"/>
        <rect x="22" y="-38" width="16" height="16" fill="#A855F7"/>
        <rect x="32" y="-8" width="16" height="16" fill="#D946EF"/>
        <rect x="7" y="12" width="16" height="16" fill="#7C3AED"/>
        <rect x="-18" y="22" width="16" height="16" fill="#8B5CF6"/>
        <rect x="-38" y="17" width="16" height="16" fill="#D946EF"/>
        <rect x="-58" y="22" width="16" height="16" fill="#A855F7"/>
        <rect x="42" y="27" width="16" height="16" fill="#8B5CF6"/>
        <rect x="17" y="42" width="16" height="16" fill="#7C3AED"/>
        <rect x="-23" y="52" width="16" height="16" fill="#A855F7"/>
    </g>

    <!-- Arrow: Embedded -> Transformer 1 -->
    <line x1="480" y1="180" x2="510" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Box 1: Transformer Block 1 -->
    <g transform="translate(580, 180)">
        <rect x="-65" y="-35" width="130" height="70" rx="6" fill="#6366F1" filter="url(#shadow)"/>
        <text x="0" y="-5" fill="#FFFFFF" font-size="18" font-weight="600" text-anchor="middle">Transformer</text>
        <text x="0" y="18" fill="#FFFFFF" font-size="18" font-weight="600" text-anchor="middle">Block 1</text>
    </g>

    <!-- Arrow: Transformer 1 -> Intermediate -->
    <line x1="650" y1="180" x2="680" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />

    <!-- 2. Intermediate State 1 -->
    <g transform="translate(740, 180)">
        <!-- Header Text -->
        <text x="0" y="-100" font-size="20" font-weight="500" fill="#0F172A" text-anchor="middle">Embedded state</text>

        <!-- Attention Links -->
        <g stroke="#A78BFA" stroke-width="1.5" opacity="0.6">
            <!-- Dense connections simulating attention -->
            <line x1="-40" y1="-10" x2="-20" y2="-35" />
            <line x1="-40" y1="-10" x2="0" y2="-15" />
            <line x1="-40" y1="-10" x2="-10" y2="30" />
            <line x1="-20" y1="-35" x2="0" y2="-15" />
            <line x1="-20" y1="-35" x2="30" y2="-30" />
            <line x1="0" y1="-15" x2="30" y2="-30" />
            <line x1="0" y1="-15" x2="40" y2="0" />
            <line x1="0" y1="-15" x2="15" y2="20" />
            <line x1="30" y1="-30" x2="40" y2="0" />
            <line x1="30" y1="-30" x2="50" y2="35" />
            <line x1="40" y1="0" x2="15" y2="20" />
            <line x1="40" y1="0" x2="50" y2="35" />
            <line x1="15" y1="20" x2="-10" y2="30" />
            <line x1="15" y1="20" x2="25" y2="50" />
            <line x1="-10" y1="30" x2="-30" y2="25" />
            <line x1="-10" y1="30" x2="-50" y2="30" />
            <line x1="-30" y1="25" x2="-50" y2="30" />
            <line x1="-30" y1="25" x2="-15" y2="60" />
            <line x1="25" y1="50" x2="-15" y2="60" />
            <line x1="25" y1="50" x2="50" y2="35" />
            <!-- Extra cross connections for transformer feel -->
            <line x1="-40" y1="-10" x2="15" y2="20" />
            <line x1="-20" y1="-35" x2="-30" y2="25" />
            <line x1="0" y1="-15" x2="50" y2="35" />
        </g>

        <!-- Transformed Nodes Layer 1 (Uniform gradient, ALL squares) -->
        <rect x="-48" y="-18" width="16" height="16" fill="#A855F7"/>
        <rect x="-28" y="-43" width="16" height="16" fill="#8B5CF6"/>
        <rect x="-8" y="-23" width="16" height="16" fill="#D946EF"/>
        <rect x="22" y="-38" width="16" height="16" fill="#7C3AED"/>
        <rect x="32" y="-8" width="16" height="16" fill="#A855F7"/>
        <rect x="7" y="12" width="16" height="16" fill="#D946EF"/>
        <rect x="-18" y="22" width="16" height="16" fill="#8B5CF6"/>
        <rect x="-38" y="17" width="16" height="16" fill="#A855F7"/>
        <rect x="-58" y="22" width="16" height="16" fill="#7C3AED"/>
        <rect x="42" y="27" width="16" height="16" fill="#D946EF"/>
        <rect x="17" y="42" width="16" height="16" fill="#8B5CF6"/>
        <rect x="-23" y="52" width="16" height="16" fill="#A855F7"/>
    </g>

    <!-- Arrow: Intermediate -> Transformer L -->
    <line x1="800" y1="180" x2="830" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Box 3: Transformer Block L -->
    <g transform="translate(900, 180)">
        <rect x="-65" y="-35" width="130" height="70" rx="6" fill="#6366F1" filter="url(#shadow)"/>
        <text x="0" y="-5" fill="#FFFFFF" font-size="18" font-weight="600" text-anchor="middle">Transformer</text>
        <text x="0" y="18" fill="#FFFFFF" font-size="18" font-weight="600" text-anchor="middle">Block L</text>
    </g>

    <!-- Arrow: Transformer L -> Transformed Inputs -->
    <line x1="970" y1="180" x2="1000" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />

    <!-- 4. Transformed Inputs (Final) -->
    <g transform="translate(1060, 180)">
        <!-- Header Text -->
        <text x="0" y="-100" font-size="20" font-weight="500" fill="#0F172A" text-anchor="middle">Final embeddings</text>

        <!-- Transformed Nodes (Uniform gradient, ALL squares) -->
        <rect x="-48" y="-18" width="16" height="16" fill="#D946EF"/>
        <rect x="-28" y="-43" width="16" height="16" fill="#A855F7"/>
        <rect x="-8" y="-23" width="16" height="16" fill="#8B5CF6"/>
        <rect x="22" y="-38" width="16" height="16" fill="#A855F7"/>
        <rect x="32" y="-8" width="16" height="16" fill="#D946EF"/>
        <rect x="7" y="12" width="16" height="16" fill="#7C3AED"/>
        <rect x="-18" y="22" width="16" height="16" fill="#8B5CF6"/>
        <rect x="-38" y="17" width="16" height="16" fill="#D946EF"/>
        <rect x="-58" y="22" width="16" height="16" fill="#A855F7"/>
        <rect x="42" y="27" width="16" height="16" fill="#8B5CF6"/>
        <rect x="17" y="42" width="16" height="16" fill="#7C3AED"/>
        <rect x="-23" y="52" width="16" height="16" fill="#A855F7"/>
    </g>

    <!-- Arrow: Downwards to Decoding -->
    <line x1="1060" y1="280" x2="1060" y2="350" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />

    <!-- ========================================== -->
    <!-- MIDDLE ROW: DECODING & LOSS                -->
    <!-- ========================================== -->

    <!-- Box 3: Elementwise Decoding -->
    <g transform="translate(1060, 450)">
        <rect x="-65" y="-35" width="130" height="70" rx="6" fill="#0EA5E9" filter="url(#shadow)"/>
        <text x="0" y="-5" fill="#FFFFFF" font-size="18" font-weight="600" text-anchor="middle">Elementwise</text>
        <text x="0" y="18" fill="#FFFFFF" font-size="18" font-weight="600" text-anchor="middle">decoding</text>
    </g>

    <!-- Arrow: Decoding -> Output Set -->
    <line x1="960" y1="450" x2="900" y2="450" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />

    <!-- 4. Output Set -->
    <g transform="translate(800, 450)">
        <!-- Header Text -->
        <text x="0" y="-100" font-size="20" font-weight="500" fill="#0F172A" text-anchor="middle">Output set</text>

        <!-- Nodes (Red Squares - Mix of Light and Dark) -->
        <!-- 3, 5, 7, 8, 12 are Dark (#EF4444), Rest are Light (#FECACA) -->
        <rect x="-48" y="-18" width="16" height="16" fill="#FECACA"/> <!-- 1 -->
        <rect x="-28" y="-43" width="16" height="16" fill="#FECACA"/> <!-- 2 -->
        <rect x="-8" y="-23" width="16" height="16" fill="#EF4444"/>  <!-- 3 (Target) -->
        <rect x="22" y="-38" width="16" height="16" fill="#FECACA"/> <!-- 4 -->
        <rect x="32" y="-8" width="16" height="16" fill="#EF4444"/>  <!-- 5 (Target) -->
        <rect x="7" y="12" width="16" height="16" fill="#FECACA"/>  <!-- 6 -->
        <rect x="-18" y="22" width="16" height="16" fill="#EF4444"/>  <!-- 7 (Target) -->
        <rect x="-38" y="17" width="16" height="16" fill="#EF4444"/>  <!-- 8 (Target) -->
        <rect x="-58" y="22" width="16" height="16" fill="#FECACA"/> <!-- 9 -->
        <rect x="42" y="27" width="16" height="16" fill="#FECACA"/> <!-- 10 -->
        <rect x="17" y="42" width="16" height="16" fill="#FECACA"/> <!-- 11 -->
        <rect x="-23" y="52" width="16" height="16" fill="#EF4444"/>  <!-- 12 (Target) -->
    </g>

    <!-- Bidirectional Arrow & Loss Text -->
    <g transform="translate(540, 450)">
        <text x="0" y="-25" font-size="18" fill="#0F172A" text-anchor="middle">Elementwise loss</text>
        <text x="0" y="30" font-size="18" fill="#0F172A" text-anchor="middle">classification &amp; regression</text>
        <line x1="-120" y1="0" x2="120" y2="0" stroke="#475569" stroke-width="2" marker-start="url(#arrow-reverse)" marker-end="url(#arrow)" />
    </g>

    <!-- 5. Target Set -->
    <g transform="translate(280, 450)">
        <!-- Header Text -->
        <text x="0" y="-100" font-size="20" font-weight="500" fill="#0F172A" text-anchor="middle">Target set</text>

        <!-- Nodes (Different from Output Set to show loss/errors) -->
        <!-- 3, 4, 7, 9, 12 are Dark (#EF4444), Rest are Light (#FECACA) -->
        <rect x="-48" y="-18" width="16" height="16" fill="#FECACA"/> <!-- 1 -->
        <rect x="-28" y="-43" width="16" height="16" fill="#FECACA"/> <!-- 2 -->
        <rect x="-8" y="-23" width="16" height="16" fill="#EF4444"/>  <!-- 3 (Match) -->
        <rect x="22" y="-38" width="16" height="16" fill="#EF4444"/>  <!-- 4 (False negative) -->
        <rect x="32" y="-8" width="16" height="16" fill="#FECACA"/>  <!-- 5 (False positive) -->
        <rect x="7" y="12" width="16" height="16" fill="#FECACA"/>  <!-- 6 -->
        <rect x="-18" y="22" width="16" height="16" fill="#EF4444"/>  <!-- 7 (Match) -->
        <rect x="-38" y="17" width="16" height="16" fill="#FECACA"/>  <!-- 8 (False positive) -->
        <rect x="-58" y="22" width="16" height="16" fill="#EF4444"/>  <!-- 9 (False negative) -->
        <rect x="42" y="27" width="16" height="16" fill="#FECACA"/> <!-- 10 -->
        <rect x="17" y="42" width="16" height="16" fill="#FECACA"/> <!-- 11 -->
        <rect x="-23" y="52" width="16" height="16" fill="#EF4444"/>  <!-- 12 (Match) -->
    </g>


    <!-- ========================================== -->
    <!-- BOTTOM EQUATIONS & LEGENDS                 -->
    <!-- ========================================== -->

    <!-- Legend -->
    <g transform="translate(600, 620)">
        <!-- Column 1: Inputs -->
        <g transform="translate(-350, 0)">
            <polygon points="0,-9 -8,6 8,6" fill="#0EA5E9"/>
            <text x="15" y="5" font-size="18" fill="#1E293B">- track</text>
            
            <circle cx="0" cy="35" r="8" fill="#F59E0B"/>
            <text x="15" y="40" font-size="18" fill="#1E293B">- cluster</text>
        </g>

        <!-- Column 2: Embeddings -->
        <g transform="translate(-150, 18)">
            <!-- Visualizing the gradient and mixed shapes -->
            <rect x="-8" y="-8" width="16" height="16" fill="#8B5CF6"/>
            <rect x="12" y="-8" width="16" height="16" fill="#A855F7"/>
            <rect x="32" y="-8" width="16" height="16" fill="#D946EF"/>
            <text x="55" y="5" font-size="18" fill="#1E293B">- embedded state</text>
        </g>

        <!-- Column 3: Targets -->
        <g transform="translate(150, 0)">
            <rect x="-8" y="-8" width="16" height="16" fill="#EF4444"/>
            <text x="15" y="5" font-size="18" fill="#1E293B">- target particle</text>
            
            <rect x="-8" y="27" width="16" height="16" fill="#FECACA"/>
            <text x="15" y="40" font-size="18" fill="#1E293B">- no target</text>
        </g>
    </g>

</svg>
